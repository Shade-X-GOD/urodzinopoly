<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#fff1f8">
  <title>Happy Birthday</title>
  <style>
    :root{
      /* A5 portrait pages: width and height using A-series ratio (sqrt(2) ≈ 1.4142) */
      --card-width: min(420px, 92vw); /* page width (responsive cap) */
      --card-height: calc(var(--card-width) * 1.4142); /* portrait height */
      --accent:#ff4da6;
      --muted:#6b6b6b;
      --safe-padding:18px;
      --bg:#fff8fb;
    }
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#fff8fb,#fff1f8);font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;color:#111}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box}

    /* Scene now always shows a single A5 portrait page */
    .scene{width:100%;max-width:var(--card-width);height:var(--card-height);position:relative;perspective:1200px}
    .card-outer{width:100%;height:100%;position:relative;transform-style:preserve-3d}

    /* Cover sits above inner pages and flips open on click (hinge on left) */
    .card-cover{
      position:absolute;inset:0;border-radius:12px;background:transparent;box-shadow:0 18px 40px rgba(0,0,0,0.16);
      display:flex;align-items:center;justify-content:center;color:white;font-size:22px;font-weight:700;z-index:30;transform-origin:left center;
      transition:transform 700ms cubic-bezier(.2,.9,.2,1);-webkit-tap-highlight-color:transparent;overflow:hidden
    }
    .card-cover .cover-sprite{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
    .card-cover .title{position:relative;padding:12px 24px;text-align:center;z-index:40;color:#fff}

    /* Inner pages container — single-page view */
    .card-inner{position:relative;inset:0;border-radius:12px;overflow:hidden;width:100%;height:100%;box-shadow:inset 0 -2px 0 rgba(0,0,0,0.02);}

    /* Pages: we keep two pages in the DOM but only show one A5 page at a time (right page is visible)
       Left page is positioned off-canvas; right page occupies the full A5 area. */
    .page{
      position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--safe-padding);box-sizing:border-box;backface-visibility:hidden;-webkit-backface-visibility:hidden
    }
    .page.left{left:-100%;opacity:0;pointer-events:none}
    .page.right{left:0;opacity:1;z-index:1}

    /* Use the provided inner sprite for page backgrounds */
    .page .content-bg{position:absolute;inset:0;background-image:url('assets/wnetrze3.png');background-size:cover;background-position:center;filter:none;z-index:0}
    .page .overlay{position:relative;z-index:2}

    .page .wishes{margin:auto;color:#2b2b2b;font-size:18px;line-height:1.4;padding:8px;position:relative}
    .page .from{margin-top:14px;color:var(--muted);font-size:14px;position:relative}

    /* small controls */
    .controls{position:absolute;right:12px;bottom:12px;display:flex;gap:8px;z-index:40}
    .btn{background:rgba(255,255,255,0.88);border-radius:10px;padding:8px 12px;font-weight:600;font-size:14px;color:#111;box-shadow:0 6px 18px rgba(0,0,0,0.08);border:0}

    /* gift card on right page — clickable flip */
    .gift-card-wrap{display:flex;align-items:center;justify-content:center;height:100%}
    .gift-card{width:min(240px,38%);height:min(140px,40%);position:relative;transform-style:preserve-3d;transition:transform 520ms cubic-bezier(.2,.9,.2,1);cursor:pointer;z-index:4}
    .gift-card .face{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;box-shadow:0 8px 20px rgba(0,0,0,0.12);overflow:hidden}
    .gift-card .face .sprite{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
    .gift-card .front{background:transparent;color:#b30055}
    .gift-card .back{background:transparent;transform:rotateY(180deg);color:#1a237e}

    /* open/closed states */
    .scene.open .card-cover{transform:rotateY(-160deg)}
    .scene.open .card-cover.hidden{display:none}

    /* flipped gift */
    .gift-card.flipped{transform:rotateY(180deg)}

    /* mobile tweaks for iPhone Safari */
    @supports (-webkit-overflow-scrolling: touch){
      .card-cover{transition:transform 620ms cubic-bezier(.22,.9,.3,1)}
      .gift-card{transition:transform 420ms cubic-bezier(.22,.9,.3,1)}
    }

    /* accessibility: reduce motion */
    @media (prefers-reduced-motion: reduce){
      .card-cover,.gift-card{transition:none}
    }

    /* small screens adjustments */
    @media (max-width:420px){
      :root{--safe-padding:14px}
      .card-cover{font-size:18px}
      .page .wishes{font-size:16px}
      .gift-card{width:200px;height:120px}
    }

    /* subtle entrance */
    .scene{opacity:0;transform:translateY(6px);transition:opacity 420ms,transform 420ms}
    .scene.ready{opacity:1;transform:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="scene" id="scene">
      <div class="card-outer" id="cardOuter">
        <div class="card-inner" aria-hidden="false">

          <div class="page left" id="leftPage">
            <div class="content-bg" aria-hidden="true"></div>
            <div class="overlay">
              <div class="wishes" id="wishesText">
                <h2 style="margin:0 0 8px 0;color:var(--accent)">Happy Birthday!</h2>
                <p style="margin:0">Wishing you a day filled with laughter, sunshine and everything that makes you smile. You're amazing — I hope this year brings you closer to your dreams.</p>
                <div class="from">— From someone who likes you</div>
              </div>
            </div>
          </div>

          <div class="page right">
            <div class="content-bg" aria-hidden="true"></div>
            <div class="overlay">
              <div class="gift-card-wrap">
                <div class="gift-card" id="giftCard" role="button" aria-pressed="false" tabindex="0">
                  <div class="face front" id="frontFace">
                    <!-- use PNG sprite for front face -->
                    <img class="sprite" src="assets/gift-front.png" alt="Gift front">
                    <div style="position:relative;z-index:2;text-align:center;padding:8px;pointer-events:none">
                      <strong>Card Front</strong>
                      <div style="font-size:12px;color:var(--muted);margin-top:6px">(tap to flip)</div>
                    </div>
                  </div>
                  <div class="face back" id="backFace">
                    <!-- use PNG sprite for back face -->
                    <img class="sprite" src="assets/gift-back.png" alt="Gift back">
                    <div style="position:relative;z-index:2;text-align:center;padding:8px;pointer-events:none">
                      <strong>Surprise!</strong>
                      <div style="font-size:12px;color:var(--muted);margin-top:6px">This is the backside placeholder.</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>

        <!-- cover placed above pages -->
        <div class="card-cover" id="cardCover" role="button" aria-label="Open card" tabindex="0">
          <!-- cover sprite PNG; falls back to title text if not available -->
          <img class="cover-sprite" src="assets/cover.png" alt="Card cover">
          <div class="title">Tap to open your card</div>
        </div>

        <div class="controls">
          <button class="btn" id="closeBtn">Close</button>
          <button class="btn" id="resetFlipBtn">Reset flip</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const sceneRoot = document.getElementById('scene');
      const cardCover = document.getElementById('cardCover');
      const gift = document.getElementById('giftCard');
      const closeBtn = document.getElementById('closeBtn');
      const resetFlipBtn = document.getElementById('resetFlipBtn');

      // entrance
      requestAnimationFrame(()=> setTimeout(()=> sceneRoot.classList.add('ready'), 60));

      function openCard(){
        sceneRoot.classList.add('open');
        cardCover.setAttribute('aria-hidden','true');
        setTimeout(()=>{ cardCover.classList.add('hidden'); }, 760);
      }
      function closeCard(){
        cardCover.classList.remove('hidden');
        sceneRoot.classList.remove('open');
        setTimeout(()=>{ cardCover.setAttribute('aria-hidden','false'); }, 40);
      }

      cardCover.addEventListener('click', openCard);
      cardCover.addEventListener('keydown', (e)=>{ if(e.key === 'Enter' || e.key === ' ') openCard(); });

      function toggleFlip(){
        const flipped = gift.classList.toggle('flipped');
        gift.setAttribute('aria-pressed', String(flipped));
      }
      gift.addEventListener('click', toggleFlip);
      gift.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' ') toggleFlip(); });

      closeBtn.addEventListener('click', closeCard);
      resetFlipBtn.addEventListener('click', ()=>{ gift.classList.remove('flipped'); gift.setAttribute('aria-pressed','false'); });

      // touch optimization
      let lastTouch = 0;
      document.addEventListener('touchstart', function(e){ const t = Date.now(); if (t - lastTouch < 300) e.preventDefault(); lastTouch = t; }, {passive:false});
    })();
  </script>
</body>
</html>
