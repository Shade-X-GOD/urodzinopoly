<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>urodzinopoly — realistic board</title>
  <meta name="theme-color" content="#ffffff">
  <style>
    :root{--bg:#f2efe9;--board-size:calc(min(92vw,92vh));--primary:#0066cc}
    html,body{height:100%;margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial}
    .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}

    .board-area{width:var(--board-size);height:var(--board-size);position:relative;perspective:1100px;-webkit-perspective:1100px}
    .board-3d{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform 420ms ease;transform-origin:center center}
    .board-3d.tilted{transform:rotateX(16deg) rotateZ(-8deg) translateZ(0)}

    /* real board sprite as background image */
    #boardVisual{position:absolute;inset:6%;width:88%;height:88%;left:6%;top:6%;border-radius:8px;overflow:hidden;box-shadow:0 18px 60px rgba(0,0,0,0.25)}
    #boardVisual img{width:100%;height:100%;object-fit:cover;display:block}

    /* overlay for interactive elements placed above the image */
    #board{position:absolute;inset:6%;width:88%;height:88%;left:6%;top:6%;box-sizing:border-box;pointer-events:none}

    .tile{position:absolute;width:calc(100% / 11);height:calc(100% / 11);box-sizing:border-box;display:flex;align-items:center;justify-content:center;font-size:10px;color:#111;pointer-events:auto;transform:translate(-50%,-50%)}
    .tile .label{pointer-events:none;text-align:center;font-size:10px;color:#fff;text-shadow:0 1px 0 rgba(0,0,0,0.5)}

    /* removed .tile.start and .tile.community visuals to avoid doubling with board sprite */

    /* realistic token as image */
    #token{position:absolute;width:42px;height:42px;transform:translate(-50%,-50%);transition:left 220ms cubic-bezier(.2,.9,.2,1), top 220ms cubic-bezier(.2,.9,.2,1), transform 140ms ease;pointer-events:none;z-index:6}
    #token img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 8px 12px rgba(0,0,0,0.32));display:block}
    /* hover/elevation state while moving (lower lift) */
    #token.hover{transform:translate(-50%,-50%) translateY(-6px) scale(1.03)}

    /* hide the overlay card stack — board sprite already contains the printed stack */
    .stack{display:none}

    /* controls */
    .controls{margin-top:14px;display:flex;gap:12px;align-items:center}
    button{padding:10px 16px;border-radius:10px;border:0;background:var(--primary);color:#fff;font-weight:600;font-size:16px;box-shadow:0 6px 14px rgba(0,0,0,0.12);-webkit-tap-highlight-color:transparent}
    button:disabled{opacity:.5}

    .dice{display:flex;gap:8px}
    .die{width:56px;height:56px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 16px rgba(0,0,0,0.12);will-change:transform}

    /* toss animation */
    .die.throw{animation: toss 900ms cubic-bezier(.22,.9,.3,1)}
    @keyframes toss{
      0% { transform: translateY(0) rotate(0deg) rotateX(0deg); }
      30% { transform: translateY(-140px) rotate(720deg) rotateX(360deg); }
      60% { transform: translateY(-40px) rotate(1080deg) rotateX(720deg); }
      100% { transform: translateY(0) rotate(1440deg) rotateX(900deg); }
    }

    .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(2px)}
    .card-preview{width:86%;max-width:360px;background:#fff;padding:18px;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,0.3)}

    @media (max-width:420px){ .die{width:44px;height:44px;font-size:18px} #token{width:36px;height:36px} button{padding:10px 14px;font-size:15px} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="board-area">
      <div class="board-3d tilted" id="board3d">
        <div id="boardVisual">
          <!-- Use the board sprite placed at assets/board.jpg -->
          <img id="boardImage" src="assets/board.jpg" alt="Board sprite (assets/board.jpg)">
        </div>

        <div id="board" aria-hidden="false"></div>

        <!-- card stack removed from overlay because it's drawn on the board sprite -->
        <div class="stack" id="community-stack" aria-hidden="true">
          <div class="card stack-bottom"></div>
          <div class="card stack-top">?</div>
        </div>

        <!-- token uses external cat token image provided by user; consider replacing with assets/token.png -->
        <div id="token" aria-hidden="true"><img id="tokenImg" src="https://i.ebayimg.com/images/g/VuoAAOSwDyVnPh7B/s-l1600.webp" alt="Cat token"></div>
      </div>
    </div>

    <div class="controls" aria-hidden="false">
      <div class="dice" aria-hidden="true">
        <div id="die1" class="die">—</div>
        <div id="die2" class="die">—</div>
      </div>
      <button id="rollBtn">Roll dice</button>
      <button id="pickBtn" style="display:none">Pick card</button>
    </div>
  </div>

  <div id="modalRoot" style="display:none"></div>

  <script>
    (function(){
      const boardEl = document.getElementById('board');
      const boardImg = document.getElementById('boardImage');
      const tokenEl = document.getElementById('token');
      const rollBtn = document.getElementById('rollBtn');
      const pickBtn = document.getElementById('pickBtn');
      const die1 = document.getElementById('die1');
      const die2 = document.getElementById('die2');
      const modalRoot = document.getElementById('modalRoot');
      const stackEl = document.getElementById('community-stack');

      const TILE_COUNT = 40;
      const tiles = [];
      const tileCenters = [];
      const tileSides = []; // which side (0 bottom,1 left,2 top,3 right)
      const communityIndex = 2; // community chest near GO (as earlier)
      const startIndex = 0;
      let currentPos = 36; // so first roll passes GO
      let firstRollDone = false;

      function createTiles(){
        const edgePad = 0.06;
        const inner = 1 - edgePad*2;
        const positions = [];
        for(let i=0;i<TILE_COUNT;i++){
          const side = Math.floor(i / 10);
          tileSides[i] = side;
          const posOnSide = i % 10;
          let x,y;
          if(side === 0){ const t = posOnSide/9; x = 1 - edgePad - inner * t; y = 1 - edgePad; }
          else if(side === 1){ const t = posOnSide/9; x = edgePad; y = 1 - edgePad - inner * t; }
          else if(side === 2){ const t = posOnSide/9; x = edgePad + inner * t; y = edgePad; }
          else { const t = posOnSide/9; x = 1 - edgePad; y = edgePad + inner * t; }
          positions.push([x*100+'%', y*100+'%']);
        }

        boardEl.innerHTML = '';
        tiles.length = 0; tileCenters.length = 0;
        for(let i=0;i<TILE_COUNT;i++){
          const el = document.createElement('div');
          el.className = 'tile';
          el.style.left = positions[i][0];
          el.style.top = positions[i][1];
          el.style.transform = 'translate(-50%,-50%)';
          const label = document.createElement('div'); label.className='label';
          // do not add 'start' or 'community' labels/classes — the board sprite already contains them
          label.textContent = '';
          el.appendChild(label);
          boardEl.appendChild(el);
          tiles.push(el);
        }

        // compute centers
        const bb = boardEl.getBoundingClientRect();
        tiles.forEach((el, i)=>{
          const rect = el.getBoundingClientRect();
          const cx = rect.left + rect.width/2 - bb.left;
          const cy = rect.top + rect.height/2 - bb.top;
          tileCenters.push({x:cx,y:cy});
        });

        // position stack near community tile for logic but keep it hidden (sprite contains visual)
        const communityRect = tiles[communityIndex].getBoundingClientRect();
        const bbb = boardEl.getBoundingClientRect();
        const left = communityRect.left - bbb.left + communityRect.width*0.5;
        const top = communityRect.top - bbb.top + communityRect.height*0.5;
        stackEl.style.left = left + 'px';
        stackEl.style.top = (top - communityRect.height*0.12) + 'px';
      }

      // helper: put token exactly at tile center
      function placeTokenAtCenter(pos){
        const idx = ((pos % TILE_COUNT) + TILE_COUNT) % TILE_COUNT;
        const center = tileCenters[idx];
        if(!center) return;
        tokenEl.style.left = center.x + 'px';
        tokenEl.style.top = center.y + 'px';
      }

      // compute a baseline-aligned target for a tile so the token travels parallel to the edge
      function getParallelTarget(pos){
        const idx = ((pos % TILE_COUNT) + TILE_COUNT) % TILE_COUNT;
        const center = tileCenters[idx];
        const side = tileSides[idx]; // 0 bottom, 1 left, 2 top, 3 right
        if(!center) return null;

        // compute baseline (average axis for the side)
        if(side === 0 || side === 2){ // bottom or top -> keep y equal to side baseline, x is tile center.x
          const ys = tileCenters.filter((_,i)=>tileSides[i]===side).map(c=>c.y);
          const baselineY = ys.reduce((s,v)=>s+v,0)/ys.length;
          return { x: center.x, y: baselineY };
        } else { // left or right -> keep x equal to side baseline, y is tile center.y
          const xs = tileCenters.filter((_,i)=>tileSides[i]===side).map(c=>c.x);
          const baselineX = xs.reduce((s,v)=>s+v,0)/xs.length;
          return { x: baselineX, y: center.y };
        }
      }

      // animate from current position to target in small steps (keeps movement parallel)
      function animateTo(target, duration = 240, cb){
        // read current computed px values
        const startRect = tokenEl.getBoundingClientRect();
        const parentRect = boardEl.getBoundingClientRect();
        const start = { x: startRect.left + startRect.width/2 - parentRect.left, y: startRect.top + startRect.height/2 - parentRect.top };
        const dx = target.x - start.x;
        const dy = target.y - start.y;
        const steps = Math.max(1, Math.round(duration / 16)); // approx 60fps frames
        let frame = 0;

        function step(){
          frame++;
          const t = frame / steps;
          // ease (easeOutQuad)
          const eased = 1 - (1 - t) * (1 - t);
          const px = start.x + dx * eased;
          const py = start.y + dy * eased;
          tokenEl.style.left = px + 'px';
          tokenEl.style.top = py + 'px';
          if(frame < steps) requestAnimationFrame(step);
          else { if(cb) cb(); }
        }
        requestAnimationFrame(step);
      }

      // main movement: for each step, move parallel to the side baseline, then finalize at center
      function animateMovement(start, steps, cb){
        let i = 0;
        tokenEl.classList.add('hover');

        function nextStep(){
          if(i >= steps){
            // land exactly in the center of the final tile
            placeTokenAtCenter(currentPos);
            tokenEl.classList.remove('hover');
            if(cb) cb();
            return;
          }
          currentPos = (start + i + 1) % TILE_COUNT;
          const parallelTarget = getParallelTarget(currentPos);
          // first move to the parallel target (keeps axis locked), then small pause then continue
          animateTo(parallelTarget, 240, ()=>{
            // slight pause to feel stepping rhythm
            setTimeout(nextStep, 80);
          });
          i++;
        }

        nextStep();
      }

      // Dice toss animation: add class .throw which runs keyframes; set numbers after animation
      function animateDice(finalA, finalB, duration=900){
        die1.classList.remove('throw'); die2.classList.remove('throw');
        void die1.offsetWidth; void die2.offsetWidth;
        die1.classList.add('throw'); die2.classList.add('throw');
        die1.textContent = '...'; die2.textContent = '...';
        setTimeout(()=>{ die1.classList.remove('throw'); die2.classList.remove('throw'); die1.textContent = finalA; die2.textContent = finalB; }, duration);
      }

      function openModal(title,body){
        modalRoot.innerHTML = '';
        const modal = document.createElement('div'); modal.className = 'modal';
        const card = document.createElement('div'); card.className='card-preview';
        const h = document.createElement('h3'); h.textContent = title;
        const p = document.createElement('p'); p.textContent = body;
        const btn = document.createElement('button'); btn.textContent = 'Close'; btn.style.marginTop='12px';
        btn.addEventListener('click', ()=>{ modalRoot.style.display='none'; modalRoot.innerHTML=''; });
        card.appendChild(h); card.appendChild(p); card.appendChild(btn); modal.appendChild(card); modalRoot.appendChild(modal); modalRoot.style.display='block';
      }

      function pickCardAnimation(cb){
        const top = stackEl.querySelector('.stack-top');
        top.style.transition='transform 420ms cubic-bezier(.2,.9,.2,1), opacity 420ms';
        top.style.transform='translateY(-140px) rotate(-6deg) scale(1.04)';
        top.style.opacity='0.98';
        setTimeout(()=>{
          openModal('Community Chest','You have drawn a Community Chest card (placeholder).');
          top.style.transition='transform 320ms ease, opacity 320ms';
          top.style.transform='translateY(0) rotate(0)';
          top.style.opacity='1';
          if(cb) cb();
        },460);
      }

      function onRoll(){
        rollBtn.disabled=true; pickBtn.style.display='none';
        let a,b,sum;
        if(!firstRollDone){
          const need = ((communityIndex - currentPos) + TILE_COUNT) % TILE_COUNT;
          sum = Math.max(2, Math.min(12, need));
          a = Math.min(6, sum-1); b = sum - a; firstRollDone = true;
        } else { a = Math.floor(Math.random()*6)+1; b = Math.floor(Math.random()*6)+1; sum = a + b; }

        animateDice(a,b,900);

        setTimeout(()=>{
          const start = currentPos;
          animateMovement(start, sum, ()=>{
            // removed visual flash for GO tile to avoid doubling with board sprite
            if(currentPos === communityIndex){ pickBtn.style.display='inline-block'; pickBtn.disabled=false; }
            rollBtn.disabled=false;
          });
        },920);
      }

      // init once board image loads
      function init(){ createTiles(); tokenEl.style.display='block'; tokenEl.setAttribute('aria-hidden','false'); placeTokenAtCenter(currentPos); rollBtn.addEventListener('click', onRoll); pickBtn.addEventListener('click', ()=>{ pickBtn.disabled=true; pickCardAnimation(()=>{ pickBtn.disabled=false; pickBtn.style.display='none'; }); }); }

      boardImg.addEventListener('load', ()=>{ setTimeout(init,80); }); if(boardImg.complete) setTimeout(init,80);
      window.addEventListener('resize', ()=>{ clearTimeout(window._rT); window._rT = setTimeout(()=>{ createTiles(); placeTokenAtCenter(currentPos); },120); });

    })();
  </script>
</body>
</html>
