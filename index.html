<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>urodzinopoly — demo</title>
  <meta name="theme-color" content="#ffffff">
  <style>
    :root{
      --bg:#f5f5f7;
      --board-size:calc(min(92vw,92vh));
      --accent:#222;
      --primary:#0066cc;
      --card-bg: #fff;
    }
    html,body{height:100%;margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial}
    .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}

    .board-area{width:var(--board-size);height:var(--board-size);position:relative;box-shadow:0 10px 30px rgba(0,0,0,0.12);background:linear-gradient(180deg,#fff,#f3f3f5);border-radius:8px;overflow:visible}

    /* Board container where tiles will be placed absolutely */
    #board{position:absolute;inset:6%;width:88%;height:88%;left:6%;top:6%;background:#0b5a2b;border-radius:6px;box-sizing:border-box}

    .tile{position:absolute;width:calc(100% / 11);height:calc(100% / 11);box-sizing:border-box;display:flex;align-items:center;justify-content:center;font-size:10px;color:#111}
    .tile.corner{width:calc(100% / 11 * 1.5);height:calc(100% / 11 * 1.5);}
    .tile .label{pointer-events:none;text-align:center;font-size:10px;color:#fff;text-shadow:0 1px 0 rgba(0,0,0,0.4)}

    /* simple visuals for community-chest and start */
    .tile.start{background:linear-gradient(90deg,#fff6a8,#ffd54a);border-radius:4px;color:#000}
    .tile.community{background:#fff;border-radius:4px;color:#000}

    /* token */
    .token{position:absolute;width:28px;height:28px;border-radius:50%;background:crimson;border:3px solid #fff;box-shadow:0 6px 14px rgba(0,0,0,0.25);transform:translate(-50%,-50%);transition:left 400ms linear, top 400ms linear}

    /* dice area */
    .controls{margin-top:14px;display:flex;gap:12px;align-items:center}
    button{padding:10px 16px;border-radius:10px;border:0;background:var(--primary);color:#fff;font-weight:600;font-size:16px;box-shadow:0 6px 14px rgba(0,0,0,0.12);-webkit-tap-highlight-color:transparent}
    button:disabled{opacity:.5}

    .dice{display:flex;gap:8px}
    .die{width:56px;height:56px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 16px rgba(0,0,0,0.12)}

    /* card stack */
    .stack{position:absolute;right:8%;top:18%;width:72px;height:96px;display:flex;align-items:center;justify-content:center}
    .card{width:72px;height:96px;border-radius:8px;background:linear-gradient(180deg,#fff,#f9f9fb);box-shadow:0 8px 18px rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;font-weight:700;color:#111;transform-origin:center;}
    .card.stack-bottom{position:absolute;transform:translateY(6px) rotate(-2deg);opacity:.9}
    .card.stack-top{position:absolute;transform:translateY(0) rotate(0deg);}

    /* drawn card preview modal */
    .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(2px);}
    .card-preview{width:86%;max-width:360px;background:var(--card-bg);padding:18px;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,0.3);}
    .card-preview h3{margin:0 0 6px}
    .card-preview p{margin:0;color:#333}

    /* small screens tweaks */
    @media (max-width:420px){
      .die{width:44px;height:44px;font-size:18px}
      .token{width:22px;height:22px}
      button{padding:10px 14px;font-size:15px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="board-area" role="application" aria-label="Monopoly demo board">
      <div id="board" aria-hidden="false"></div>
      <div class="stack" id="community-stack" aria-hidden="true">
        <div class="card stack-bottom"></div>
        <div class="card stack-top">?</div>
      </div>
      <div id="token" class="token" aria-hidden="true"></div>
    </div>

    <div class="controls" aria-hidden="false">
      <div class="dice" aria-hidden="true">
        <div id="die1" class="die">&mdash;</div>
        <div id="die2" class="die">&mdash;</div>
      </div>
      <button id="rollBtn">Roll dice</button>
      <button id="pickBtn" style="display:none">Pick card</button>
    </div>
  </div>

  <!-- modal area for card reveal -->
  <div id="modalRoot" style="display:none"></div>

  <script>
    // Basic board and animation engine (lightweight)
    (function(){
      const boardEl = document.getElementById('board');
      const tokenEl = document.getElementById('token');
      const rollBtn = document.getElementById('rollBtn');
      const pickBtn = document.getElementById('pickBtn');
      const die1 = document.getElementById('die1');
      const die2 = document.getElementById('die2');
      const modalRoot = document.getElementById('modalRoot');
      const stackEl = document.getElementById('community-stack');

      const TILE_COUNT = 40;
      const tiles = [];
      const tileCenters = [];
      const communityIndex = 2; // choose index 2 as community chest
      const startIndex = 0;
      let currentPos = 36; // start token near the end so first roll will pass Start
      let firstRollDone = false;

      function createTiles(){
        // Place tiles around perimeter using 11x11 grid math
        const n = 11;
        // mapping of 40 positions onto perimeter grid positions
        const positions = [];
        // top row left->right (0..9) indices 0..9 (but include corners later)
        // We'll generate 40 positions around perimeter clockwise starting at index 0 = Start (bottom-right corner)
        // To keep it simple: compute positions around square per index
        const boardRect = boardEl.getBoundingClientRect();
        const w = boardRect.width;
        const h = boardRect.height;
        const s = Math.min(w,h);

        // compute centers using polar-like perimeter layout
        for(let i=0;i<TILE_COUNT;i++){
          const fraction = i / TILE_COUNT;
          // map to perimeter: 0..0.25 top edge, 0.25..0.5 left edge, 0.5..0.75 bottom, 0.75..1 right -- but we want clockwise starting bottom-right
          // We'll start at bottom-right corner (startIndex)
          let x,y;
          const side = Math.floor(i / 10);
          const posOnSide = i % 10;
          const edgePad = 0.06; // inset inside board
          const inner = 1 - edgePad*2;
          if(side === 0){ // bottom edge, right->left
            const t = posOnSide/9;
            x = 1 - edgePad - inner * t;
            y = 1 - edgePad;
          } else if(side === 1){ // left edge, bottom->top
            const t = posOnSide/9;
            x = edgePad;
            y = 1 - edgePad - inner * t;
          } else if(side === 2){ // top edge, left->right
            const t = posOnSide/9;
            x = edgePad + inner * t;
            y = edgePad;
          } else { // right edge, top->bottom
            const t = posOnSide/9;
            x = 1 - edgePad;
            y = edgePad + inner * t;
          }
          positions.push([x*100+'%', y*100+'%']);
        }

        // create DOM tiles
        boardEl.innerHTML = '';
        for(let i=0;i<TILE_COUNT;i++){
          const el = document.createElement('div');
          el.className = 'tile';
          el.style.left = positions[i][0];
          el.style.top = positions[i][1];
          el.style.transform = 'translate(-50%,-50%)';
          const label = document.createElement('div');
          label.className='label';
          if(i===startIndex) { el.classList.add('start'); label.textContent='GO'; }
          else if(i===communityIndex){ el.classList.add('community'); label.textContent='Community Chest'; }
          else { label.textContent = i; }
          el.appendChild(label);
          boardEl.appendChild(el);
          tiles.push(el);

          // compute center positions in px for token movement
          const rect = el.getBoundingClientRect();
          const cx = rect.left + rect.width/2 - boardEl.getBoundingClientRect().left;
          const cy = rect.top + rect.height/2 - boardEl.getBoundingClientRect().top;
          tileCenters.push({x:cx,y:cy});
        }

        // position stack near community tile
        const communityRect = tiles[communityIndex].getBoundingClientRect();
        const bb = boardEl.getBoundingClientRect();
        stackEl.style.left = (communityRect.left - bb.left + communityRect.width*0.5) + 'px';
        stackEl.style.top = (communityRect.top - bb.top + communityRect.height*0.5 - 20) + 'px';

      }

      function placeToken(pos){
        const idx = ((pos % TILE_COUNT) + TILE_COUNT) % TILE_COUNT;
        const center = tileCenters[idx];
        if(!center) return;
        tokenEl.style.left = center.x + 'px';
        tokenEl.style.top = center.y + 'px';
      }

      function animateMovement(start, steps, cb){
        let i=0;
        tokenEl.style.transition = 'left 300ms linear, top 300ms linear';
        function step(){
          if(i>=steps){
            tokenEl.style.transition = '';
            if(cb) cb();
            return;
          }
          currentPos = (start + i + 1) % TILE_COUNT;
          placeToken(currentPos);
          i++;
          setTimeout(step, 340);
        }
        step();
      }

      // responsive rebuild on resize
      let resizeTimer;
      function rebuild(){
        tiles.length=0;tileCenters.length=0;
        createTiles();
        placeToken(currentPos);
      }
      window.addEventListener('resize', ()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(rebuild,120);});

      // dice visuals
      function showDice(a,b){ die1.textContent = a; die2.textContent = b; }
      function animateDice(finalA, finalB, duration=900){
        const start = Date.now();
        const frames = Math.max(6, Math.floor(duration/80));
        let count=0;
        const iv = setInterval(()=>{
          count++;
          die1.textContent = Math.floor(Math.random()*6)+1;
          die2.textContent = Math.floor(Math.random()*6)+1;
          if(count>=frames){ clearInterval(iv); showDice(finalA,finalB); }
        },80);
      }

      function openModal(title,body){
        modalRoot.innerHTML = '';
        const modal = document.createElement('div'); modal.className='modal';
        const card = document.createElement('div'); card.className='card-preview';
        const h = document.createElement('h3'); h.textContent = title;
        const p = document.createElement('p'); p.textContent = body;
        const btn = document.createElement('button'); btn.textContent = 'Close'; btn.style.marginTop='12px';
        btn.addEventListener('click', ()=>{modalRoot.style.display='none';modalRoot.innerHTML='';});
        card.appendChild(h); card.appendChild(p); card.appendChild(btn);
        modal.appendChild(card);
        modalRoot.appendChild(modal);
        modalRoot.style.display='block';
      }

      function pickCardAnimation(cb){
        // animate top card sliding up and revealing
        const top = stackEl.querySelector('.stack-top');
        top.style.transition='transform 420ms cubic-bezier(.2,.9,.2,1), opacity 420ms';
        top.style.transform='translateY(-120px) rotate(-6deg) scale(1.02)';
        top.style.opacity='0.98';
        setTimeout(()=>{
          // show modal with mock content
          openModal('Community Chest', 'You have found a Community Chest card. (This is placeholder content.)');
          // reset card
          top.style.transition='transform 320ms ease, opacity 320ms';
          top.style.transform='translateY(0) rotate(0)';
          top.style.opacity='1';
          if(cb) cb();
        },450);
      }

      // initial setup
      function init(){
        createTiles();
        tokenEl.style.display='block';
        tokenEl.setAttribute('aria-hidden','false');
        // compute centers again after layout
        tileCenters.length=0;
        tiles.forEach((el,i)=>{
          const rect = el.getBoundingClientRect();
          const cx = rect.left + rect.width/2 - boardEl.getBoundingClientRect().left;
          const cy = rect.top + rect.height/2 - boardEl.getBoundingClientRect().top;
          tileCenters.push({x:cx,y:cy});
        });
        placeToken(currentPos);

        rollBtn.addEventListener('click', onRoll);
        pickBtn.addEventListener('click', ()=>{
          pickBtn.disabled=true;
          pickCardAnimation(()=>{ pickBtn.disabled=false; pickBtn.style.display='none'; });
        });
      }

      function onRoll(){
        rollBtn.disabled=true;
        pickBtn.style.display='none';
        // special first-roll sequence to cross Start and land on community
        let a,b,sum;
        if(!firstRollDone){
          // force sum such that token will pass start and land on communityIndex
          const need = ((communityIndex - currentPos) + TILE_COUNT) % TILE_COUNT;
          // choose two dice that sum to need (if between 2..12). If not, cap.
          sum = Math.max(2, Math.min(12, need));
          // split into two dice
          a = Math.min(6, sum-1);
          b = sum - a;
          firstRollDone = true;
        } else {
          a = Math.floor(Math.random()*6)+1;
          b = Math.floor(Math.random()*6)+1;
          sum = a + b;
        }

        animateDice(a,b,900);

        setTimeout(()=>{
          // move token step-by-step
          const start = currentPos;
          animateMovement(start, sum, ()=>{
            // after movement
            // check if passed start (we passed if start + sum >= TILE_COUNT)
            if(start + sum >= TILE_COUNT) {
              // simple indicator — flash Start tile
              const startTile = tiles[startIndex];
              startTile.style.boxShadow = '0 0 0 4px rgba(255,240,160,0.7)';
              setTimeout(()=>startTile.style.boxShadow='',500);
            }
            // if landed on community chest, show pick button
            if(currentPos === communityIndex){
              pickBtn.style.display='inline-block';
              pickBtn.disabled=false;
            }
            rollBtn.disabled=false;
          });
        },920);
      }

      // wait for layout to stabilize then init
      window.addEventListener('load', ()=>{setTimeout(init,60)});

    })();
  </script>
</body>
</html>
